<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title♠프라이즈 계산기♠</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<h1>♠프라이즈 계산기♠</h1>
<p class="subtitle">
Chip Chop & True ICM Calculator
</p>
</header>

<section class="card">

<div class="field">
<label>계산 방식</label>

<div class="mode-selector">

<label class="radio-card">
<input
type="radio"
name="mode"
value="chip"
checked>
<span>Chip Chop</span>
</label>

<label class="radio-card">
<input
type="radio"
name="mode"
value="icm">
<span>ICM Chop</span>
</label>

</div>
</div>

<div class="field" id="chipPrizeSection">

<label for="totalPrize">
총 상금 (원)
</label>

<input
type="text"
id="totalPrize"
placeholder="300000">
</div>

<div class="field">

<label for="playerCount">
플레이어 수
</label>

<select id="playerCount">

<option value="2">2명</option>
<option value="3">3명</option>
<option value="4">4명</option>
<option value="5">5명</option>
<option value="6">6명</option>
<option value="7">7명</option>
<option value="8">8명</option>
<option value="9">9명</option>
<option value="10">10명</option>

</select>

</div>

</section>

<section
class="card hidden"
id="payoutStructureSection">

<h2>ICM 상금 구조</h2>

<div id="payoutInputs"></div>

</section>

<section class="card">

<h2>플레이어 칩</h2>

<div id="playerInputs"></div>

</section>

<button
id="calculateBtn"
class="primary-btn">

계산하기

</button>

<section
id="resultsSection"
class="hidden">

<h2>결과</h2>

<div id="results"></div>

<div class="summary">

<div class="summary-row">
<span>총 지급액</span>
<span id="totalPaid">
0원
</span>
</div>

</div>

<button
id="copyBtn"
class="secondary-btn">

결과 복사

</button>

</section>

<footer>
<div class="footer-text">
Made for Poker Friends ♠
</div>
</footer>

</div>

<script src="app.js"></script>

</body>
</html>
