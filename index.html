<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>홀덤 칩 비율 계산기</title>

<style>
body{
font-family:Arial,sans-serif;
background:#121212;
color:white;
padding:20px;
max-width:700px;
margin:auto;
}

h1{
text-align:center;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:none;
border-radius:5px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#00c853;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #444;
text-align:center;
}
</style>
</head>

<body>

<h1>홀덤 칩 비율 계산기</h1>

<div class="card">

<label>총 상금 (원)</label>
<input type="number" id="prize" value="30000">

<label>플레이어 수</label>
<input type="number" id="playerCount" min="2" max="10" value="2">

<button onclick="makePlayers()">
플레이어 생성
</button>

</div>

<div id="players"></div>

<button onclick="calculate()">
계산하기
</button>

<div id="result"></div>

<script>

makePlayers();

function makePlayers(){

const count =
parseInt(document.getElementById("playerCount").value);

let html = '<div class="card">';

for(let i=1;i<=count;i++){

html += `
<label>플레이어 ${i} 칩</label>
<input
type="number"
id="chip${i}"
value="${10000*i}">
`;
}

html += '</div>';

document.getElementById("players").innerHTML = html;
}

function calculate(){

const prize =
parseInt(document.getElementById("prize").value);

const count =
parseInt(document.getElementById("playerCount").value);

let chips = [];

for(let i=1;i<=count;i++){

chips.push(
parseInt(document.getElementById(`chip${i}`).value)||0
);

}

const totalChips =
chips.reduce((a,b)=>a+b,0);

let payouts = [];

for(let chip of chips){

let value =
Math.floor(
(prize*chip/totalChips)/100
)*100;

payouts.push(value);
}

let used =
payouts.reduce((a,b)=>a+b,0);

let remain =
prize-used;

let leader =
chips.indexOf(Math.max(...chips));

payouts[leader]+=remain;

let html = `
<div class="card">
<table>
<tr>
<th>플레이어</th>
<th>칩</th>
<th>상금</th>
</tr>
`;

for(let i=0;i<count;i++){

html += `
<tr>
<td>${i+1}</td>
<td>${chips[i].toLocaleString()}</td>
<td>${payouts[i].toLocaleString()}원</td>
</tr>
`;
}

html += `
</table>
</div>
`;

document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
