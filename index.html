<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>포커 룰루</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
    <h1>♠ 프라이즈 계산기 ♠</h1>
</header>

<!-- 계산 방식 -->

<section class="card">

```
<label class="section-label">
    계산 방식
</label>

<div class="mode-selector">

    <label class="radio-card">
        <input
            type="radio"
            name="mode"
            value="chip"
            checked>
        <span>Chip Chop</span>
    </label>

    <label class="radio-card">
        <input
            type="radio"
            name="mode"
            value="icm">
        <span>ICM Chop</span>
    </label>

</div>
```

</section>

<!-- 총 상금 -->

<section class="card">

```
<h2>총 상금</h2>

<input
    type="text"
    id="totalPrize"
    placeholder="총 상금 입력"
    inputmode="numeric">
```

</section>

<!-- ICM 상금 구조 -->

<section
    id="payoutStructureSection"
    class="card hidden">

```
<h2>ICM 상금 구조</h2>

<div id="payoutInputs"></div>
```

</section>

<!-- 플레이어 -->

<section class="card">

```
<div class="section-header">

    <h2>플레이어</h2>

    <select id="playerCount">

        <option value="2">2명</option>
        <option value="3">3명</option>
        <option value="4">4명</option>
        <option value="5">5명</option>
        <option value="6">6명</option>
        <option value="7">7명</option>
        <option value="8">8명</option>
        <option value="9">9명</option>
        <option value="10">10명</option>

    </select>

</div>

<div id="playerInputs"></div>
```

</section>

<button
 id="calculateBtn"
 class="primary-btn">

```
계산하기
```

</button>

<!-- 결과 -->

<section
    id="resultsSection"
    class="card hidden">

```
<h2>결과</h2>

<div id="results"></div>

<div class="summary">

    <div class="summary-row">
        <span>총 지급액</span>
        <span id="totalPaid">0원</span>
    </div>

</div>

<button
    id="copyBtn"
    class="secondary-btn">

    결과 복사

</button>
```

</section>

<footer>
    <div class="footer-text">
        Made by Yithm
    </div>
</footer>

</div>

<script src="app.js"></script>

</body>
</html>
